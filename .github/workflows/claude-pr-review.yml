name: Claude PR Review Response

on:
  issue_comment:
    types: [created]

jobs:
  respond-to-review:
    # Only run on PR comments that mention @claude on a claude/* branch
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Respond to review feedback
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            A reviewer has commented on this PR mentioning @claude. Read the
            comment, implement any requested changes, and reply explaining
            what you did.

            Rules:
            - Follow the conventions in CLAUDE.md.
            - If a requested change conflicts with repo conventions, do not make it.
              Reply explaining the conflict.
            - If a change is out of scope for this PR, reply suggesting it be handled
              separately.
            - Commit with a message like "fix: address review feedback".
